<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Una sorpresa especial</title>

<style>

body{
margin:0;
overflow:hidden;
font-family:Arial;
background:black;
color:white;
text-align:center;
}

/* CANVAS GALAXIA */

canvas{
position:absolute;
top:0;
left:0;
}

/* SOBRE */

#start{
position:absolute;
top:50%;
left:50%;
transform:translate(-50%,-50%);
z-index:2;
}

.envelope{
width:220px;
height:150px;
background:#ff4fa3;
border-radius:10px;
cursor:pointer;
box-shadow:0 0 30px #ff4fa3;
position:relative;
}

.envelope:before{
content:"";
position:absolute;
top:0;
left:0;
width:100%;
height:100%;
background:#ff7ec5;
clip-path:polygon(0 0,100% 0,50% 60%);
}

/* CARTA */

.card{
display:none;
position:absolute;
top:50%;
left:50%;
transform:translate(-50%,-50%);
max-width:600px;
background:rgba(255,255,255,0.1);
padding:30px;
border-radius:20px;
backdrop-filter:blur(10px);
box-shadow:0 0 40px rgba(255,0,150,0.5);
z-index:3;
}

h1{
color:#ff8ad8;
}

#text{
margin-top:20px;
font-size:20px;
line-height:1.6;
}

.final{
margin-top:20px;
font-style:italic;
color:#ffb3e6;
}

/* CORAZONES */

.heart{
position:absolute;
font-size:24px;
animation:float 6s linear infinite;
}

@keyframes float{
0%{transform:translateY(0);opacity:1;}
100%{transform:translateY(-110vh);opacity:0;}
}

</style>
</head>

<body>

<canvas id="space"></canvas>

<div id="start">
<div class="envelope" onclick="openLetter()"></div>
<p>Toca el sobre 💌</p>
</div>

<div class="card" id="card">

<h1>💜 Hola preciosa 💜</h1>

<p id="text"></p>

<p class="final">
Hecho con código por alguien que te aprecia mucho 💜
</p>

<audio id="music" loop>
<source src="https://cdn.pixabay.com/audio/2022/03/15/audio_5d8a9f7c34.mp3">
</audio>

</div>

<script>

/* GALAXIA */

const canvas=document.getElementById("space");
const ctx=canvas.getContext("2d");

canvas.width=window.innerWidth;
canvas.height=window.innerHeight;

let stars=[];

for(let i=0;i<200;i++){

stars.push({
x:Math.random()*canvas.width,
y:Math.random()*canvas.height,
size:Math.random()*2
});

}

function animate(){

ctx.fillStyle="black";
ctx.fillRect(0,0,canvas.width,canvas.height);

ctx.fillStyle="white";

stars.forEach(s=>{

ctx.beginPath();
ctx.arc(s.x,s.y,s.size,0,Math.PI*2);
ctx.fill();

s.y+=0.3;

if(s.y>canvas.height){
s.y=0;
}

});

requestAnimationFrame(animate);

}

animate();

/* MENSAJE */

const message="Quería hacer algo diferente para ti... ✨ \
Tal vez muchos regalan flores, pero yo soy programador 😄 \
y quise programar algo especial. \
Desde que te conocí me pareces una persona increíble. \
Tu sonrisa, tu forma de ser y tu energía hacen que todo sea más bonito. \
Solo quería decirte que eres muy especial y que me alegra mucho haberte conocido. 💜";

let i=0;

function openLetter(){

document.getElementById("start").style.display="none";
document.getElementById("card").style.display="block";

document.getElementById("music").play();

typeWriter();

}

/* EFECTO ESCRITURA */

function typeWriter(){

if(i < message.length){

document.getElementById("text").innerHTML += message.charAt(i);
i++;

setTimeout(typeWriter,40);

}else{

fireworks();

}

}

/* CORAZONES */

function hearts(){

const heart=document.createElement("div");

heart.classList.add("heart");

heart.innerHTML="💜";

heart.style.left=Math.random()*100+"%";
heart.style.bottom="0";

document.body.appendChild(heart);

setTimeout(()=>{
heart.remove();
},6000);

}

setInterval(hearts,400);

/* FUEGOS ARTIFICIALES */

function fireworks(){

for(let i=0;i<25;i++){

setTimeout(()=>{

const spark=document.createElement("div");

spark.innerHTML="✨";

spark.style.position="absolute";
spark.style.left=Math.random()*100+"%";
spark.style.top=Math.random()*100+"%";
spark.style.fontSize="30px";

document.body.appendChild(spark);

setTimeout(()=>spark.remove(),1500);

},i*200);

}

}

</script>

</body>
</html>
